# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root (Biome shared tooling) - npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      root-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend (Express + TypeScript) - npm
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps-backend)"
      prefix-development: "chore(deps-dev-backend)"
      include: "scope"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend (React + Vite + TypeScript) - npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps-frontend)"
      prefix-development: "chore(deps-dev-frontend)"
      include: "scope"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
